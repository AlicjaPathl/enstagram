<!DOCTYPE html>
<html lang="pl">
<head>
    <title>Mini Insta</title>
    <style>
        body { font-family: Arial; text-align: center; background: #fafafa; }
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .gallery img { width: 300px; height: 300px; object-fit: cover; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .upload-section { background: white; padding: 20px; border-bottom: 1px solid #dbdbdb; }
    </style>
</head>
<body>
    <div class="upload-section">
        <h1>📸 Mini Instagram</h1>
        <form action="/upload" method="post" enctype="multipart/form-data">
            <input type="file" name="file" accept="image/*">
            <button type="submit">Opublikuj</button>
        </form>
    </div>

    <div class="gallery">
        {% for image in images %}
            <img src="{{ url_for('static', filename='uploads/' + image) }}">
        {% endfor %}
    </div>
</body>
</html>
